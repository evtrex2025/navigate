version: "3.8"

services:

  mqtt:
    image: emqx/emqx:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - ./certs:/opt/emqx/etc/certs
    environment:
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_LISTENERS__SSL__DEFAULT__BIND: 0.0.0.0:8883
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /opt/emqx/etc/certs/server.crt
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: /opt/emqx/etc/certs/server.key
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: /opt/emqx/etc/certs/ca.crt
    restart: always

  db:
    image: timescale/timescaledb:latest-pg14
    container_name: tracker-db
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: trackerdb
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    restart: always

  backend:
    image: python:3.11
    container_name: tracker-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: python worker.py
    depends_on:
      - mqtt
      - db
    restart: always

volumes:
  dbdata:
